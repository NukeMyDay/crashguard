version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketpulse
      POSTGRES_PASSWORD: marketpulse
      POSTGRES_DB: marketpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://marketpulse:marketpulse@postgres:5432/marketpulse
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  pipelines:
    build:
      context: ..
      dockerfile: infra/Dockerfile.pipelines
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://marketpulse:marketpulse@postgres:5432/marketpulse
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
